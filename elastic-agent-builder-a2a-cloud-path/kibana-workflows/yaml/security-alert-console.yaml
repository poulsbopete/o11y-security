name: A2A Lab — alert audit (console)
description: >
  Workshop demo — logs alert payload, **POSTs to Observability Agent Builder /converse** (default URL + Basic auth from
  bootstrap.json at push time; optional **O11Y_AGENT_ENDPOINT** + **O11Y_API_KEY** in workshop.env for a custom URL),
  then opens an Elastic Security case with the model reply embedded. Native `http` is capped near Kibana’s default
  connector timeout (~60s). Avoid also attaching **alert to Security Case** on the same rule.
enabled: true
tags:
  - a2a-lab
triggers:
  - type: alert
steps:
  - name: log_alert
    type: console
    with:
      message: "Rule '{{ event.alerts[0].kibana.alert.rule.name }}' fired\n{{ event | json:2 }}"
  - name: a2a_call_observability_agent
    type: http
    with:
      url: "__WF_O11Y_AGENT_ENDPOINT__"
      method: POST
      headers:
        Content-Type: application/json
        kbn-xsrf: "true"
        Authorization: "__WF_O11Y_AUTHORIZATION__"
      body: |
        {
          "agent_id": "a2a-lab-observability-context",
          "input": "[A2A_WF] Security alert peer review — host {{ event.alerts[0].host.name }}; rule: {{ event.alerts[0].kibana.alert.rule.name }}; reason: {{ event.alerts[0].kibana.alert.reason }}."
        }
    on-failure:
      continue: true
  - name: create_a_case
    type: kibana.createCaseDefaultSpace
    with:
      title: "{% assign rname = event.alerts[0].kibana.alert.rule.name | default: \"\" | downcase %}{% assign alert_suffix = event.alerts[0].kibana.alert.uuid | default: execution.id | slice: -1 | downcase %}{% capture drill_title %}{% if rname contains \"endpoint\" %}{% if alert_suffix == \"0\" or alert_suffix == \"1\" or alert_suffix == \"2\" %}Database / auth — spray & lockouts{% elsif alert_suffix == \"3\" or alert_suffix == \"4\" or alert_suffix == \"5\" %}Database / auth — shared credential misuse{% elsif alert_suffix == \"6\" or alert_suffix == \"7\" or alert_suffix == \"8\" %}Database / host — privileged access drift{% elsif alert_suffix == \"9\" or alert_suffix == \"a\" or alert_suffix == \"b\" %}Database — bulk read / export anomaly{% elsif alert_suffix == \"c\" or alert_suffix == \"d\" %}Database — odd-hours admin access{% else %}Database — lateral movement to DB host{% endif %}{% else %}{% if alert_suffix == \"0\" or alert_suffix == \"1\" or alert_suffix == \"2\" %}Lateral movement hint{% elsif alert_suffix == \"3\" or alert_suffix == \"4\" or alert_suffix == \"5\" %}Suspicious code execution{% elsif alert_suffix == \"6\" or alert_suffix == \"7\" or alert_suffix == \"8\" %}Credential access pattern{% elsif alert_suffix == \"9\" or alert_suffix == \"a\" or alert_suffix == \"b\" %}Data staging / exfil prep{% elsif alert_suffix == \"c\" or alert_suffix == \"d\" %}C2-like beaconing{% else %}Privilege / defense evasion{% endif %}{% endif %}{% endcapture %}{{ event.alerts[0].kibana.alert.rule.name }} — {{ drill_title | strip }} (lab)"
      description: |
        {% assign rname = event.alerts[0].kibana.alert.rule.name | default: "" | downcase %}
        {% assign alert_suffix = event.alerts[0].kibana.alert.uuid | default: execution.id | slice: -1 | downcase %}
        {% capture drill_detail %}{% if rname contains "endpoint" %}{% if alert_suffix == "0" or alert_suffix == "1" or alert_suffix == "2" %}**Database / auth — spray & lockouts** — same `workshop-synth-endpoint-alerts` rows support **Ops** (failed batch jobs, misconfig) and **Security** (credential stuffing, brute force); filter `workshop.demo_stream: database`.{% elsif alert_suffix == "3" or alert_suffix == "4" or alert_suffix == "5" %}**Database / auth — shared credential misuse** — service accounts hitting interactive patterns; validate with app owners.{% elsif alert_suffix == "6" or alert_suffix == "7" or alert_suffix == "8" %}**Database / host — privileged access drift** — correlate with OS and web signals on `prod-db-01`.{% elsif alert_suffix == "9" or alert_suffix == "a" or alert_suffix == "b" %}**Database — bulk read / export anomaly** — unusual volume or off-SLA access to sensitive schemas.{% elsif alert_suffix == "c" or alert_suffix == "d" %}**Database — odd-hours admin access** — maintenance windows vs shadow admin activity.{% else %}**Database — lateral movement to DB host** — pivot from endpoint to data-plane risk.{% endif %}{% else %}{% if alert_suffix == "0" or alert_suffix == "1" or alert_suffix == "2" %}**Lateral movement hint** — pivot across hosts/users in the same window as this alert; map sessions and rare processes.{% elsif alert_suffix == "3" or alert_suffix == "4" or alert_suffix == "5" %}**Suspicious code execution** — treat like interpreter abuse, LOLBins, or unexpected script chains tied to the entity above.{% elsif alert_suffix == "6" or alert_suffix == "7" or alert_suffix == "8" %}**Credential access pattern** — focus on logon anomalies, token reuse, or brute-force precursors around the alert time.{% elsif alert_suffix == "9" or alert_suffix == "a" or alert_suffix == "b" %}**Data staging / exfil prep** — look for archive activity, unusual volume, or off-hours access to sensitive paths.{% elsif alert_suffix == "c" or alert_suffix == "d" %}**C2-like beaconing** — correlate DNS / TLS / fixed-interval egress with the host’s baseline.{% else %}**Privilege / defense evasion** — trace elevation, tampering, or weakening of visibility near this signal.{% endif %}{% endif %}{% endcapture %}

        ## Executive summary
        This case was opened automatically by the **A2A Lab** workflow when a detection rule fired. Treat it as a first-pass triage record: confirm the alert is expected for the workshop, then pivot to host and user context.

        ## Randomized drill scenario
        {{ drill_detail | strip }}
        _Picked from the last hex digit of the alert UUID (stable for this alert); **endpoint** workshop rules map to **Database / auth** drills._

        ## A2A — Observability peer check (Security → O11y, HTTP)
        This workflow **POSTs** to **Observability** `api/agent_builder/converse` (default: URL + Basic auth from **bootstrap.json**
        when **06** runs; or **O11Y_AGENT_ENDPOINT** + **O11Y_API_KEY** for a custom published URL). Use the response as **operational
        context**—not a substitute for SIEM verdicts.

        **Observability agent response (raw)**:
        {{ steps.a2a_call_observability_agent.output }}
        {% if steps.a2a_call_observability_agent.error %}
        **Peer HTTP step error** (case still opened): {{ steps.a2a_call_observability_agent.error }}
        {% endif %}

        | Field | Value |
        | --- | --- |
        | **Rule** | {{ event.alerts[0].kibana.alert.rule.name }} |
        | **Reason** | {{ event.alerts[0].kibana.alert.reason }} |
        | **Host** | {{ event.alerts[0].host.name }} |
        | **Alert id** | {{ event.alerts[0].kibana.alert.uuid }} |

        ## Backlog (GitHub)
        To track follow-up outside Kibana, open **Issues → New issue** in this workshop repo and choose **Security-side scenario** (or **Cross-domain A2A** if Observability context matters). Paste the **Alert id** from the table above.

        ## Suggested next steps
        1. Open the linked alert(s) in **Investigate** (alerts stay synced because `syncAlerts` is on).
        2. Check **Timeline** or **Discover** for the same time window on `workshop-synth-endpoint-alerts`.
        3. If A2A enrichment is enabled, query **`.elastic-agents-security-a2a-enriched`** for merged agent + A2A audit fields (response time, severity, tool metadata).

        ## Where A2A fits
        Agent-to-agent calls that touch production should leave an auditable trail. Use this case to correlate **who** (user), **where** (host), and **what** (rule reason) before closing or escalating.
      tags: ["a2a-lab", "workflow", "automated-response"]
      severity: "high"
      owner: "securitySolution"
      settings:
        syncAlerts: true
      connector:
        id: "none"
        name: "none"
        type: ".none"
        fields: null
