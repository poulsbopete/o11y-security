name: A2A Lab — alert audit (console)
description: >
  Workshop demo — logs alert payload when a rule fires and opens an Elastic Security case
  (one workflow so a single rule action does both; avoid also attaching **alert to Security Case** on the same rule).
enabled: true
tags:
  - a2a-lab
triggers:
  - type: alert
steps:
  - name: log_alert
    type: console
    with:
      message: "Rule '{{ event.alerts[0].kibana.alert.rule.name }}' fired"
      details: "{{ event | json:2 }}"
  - name: create_a_case
    type: kibana.createCaseDefaultSpace
    with:
      title: "{% assign alert_suffix = event.alerts[0].kibana.alert.uuid | default: execution.id | slice: -1 | downcase %}{% capture drill_title %}{% if alert_suffix == \"0\" or alert_suffix == \"1\" or alert_suffix == \"2\" %}Lateral movement hint{% elsif alert_suffix == \"3\" or alert_suffix == \"4\" or alert_suffix == \"5\" %}Suspicious code execution{% elsif alert_suffix == \"6\" or alert_suffix == \"7\" or alert_suffix == \"8\" %}Credential access pattern{% elsif alert_suffix == \"9\" or alert_suffix == \"a\" or alert_suffix == \"b\" %}Data staging / exfil prep{% elsif alert_suffix == \"c\" or alert_suffix == \"d\" %}C2-like beaconing{% else %}Privilege / defense evasion{% endif %}{% endcapture %}{{ event.alerts[0].kibana.alert.rule.name }} — {{ drill_title | strip }} (lab)"
      description: |
        {% assign alert_suffix = event.alerts[0].kibana.alert.uuid | default: execution.id | slice: -1 | downcase %}
        {% capture drill_detail %}{% if alert_suffix == "0" or alert_suffix == "1" or alert_suffix == "2" %}**Lateral movement hint** — pivot across hosts/users in the same window as this alert; map sessions and rare processes.{% elsif alert_suffix == "3" or alert_suffix == "4" or alert_suffix == "5" %}**Suspicious code execution** — treat like interpreter abuse, LOLBins, or unexpected script chains tied to the entity above.{% elsif alert_suffix == "6" or alert_suffix == "7" or alert_suffix == "8" %}**Credential access pattern** — focus on logon anomalies, token reuse, or brute-force precursors around the alert time.{% elsif alert_suffix == "9" or alert_suffix == "a" or alert_suffix == "b" %}**Data staging / exfil prep** — look for archive activity, unusual volume, or off-hours access to sensitive paths.{% elsif alert_suffix == "c" or alert_suffix == "d" %}**C2-like beaconing** — correlate DNS / TLS / fixed-interval egress with the host’s baseline.{% else %}**Privilege / defense evasion** — trace elevation, tampering, or weakening of visibility near this signal.{% endif %}{% endcapture %}

        ## Executive summary
        This case was opened automatically by the **A2A Lab** workflow when a detection rule fired. Treat it as a first-pass triage record: confirm the alert is expected for the workshop, then pivot to host and user context.

        ## Randomized drill scenario
        {{ drill_detail | strip }}
        _Picked from the last hex digit of the alert UUID (stable for this alert); reruns keep the same storyline._

        | Field | Value |
        | --- | --- |
        | **Rule** | {{ event.alerts[0].kibana.alert.rule.name }} |
        | **Reason** | {{ event.alerts[0].kibana.alert.reason }} |
        | **Host** | {{ event.alerts[0].host.name }} |
        | **Alert id** | {{ event.alerts[0].kibana.alert.uuid }} |

        ## Backlog (GitHub)
        To track follow-up outside Kibana, open **Issues → New issue** in this workshop repo and choose **Security-side scenario** (or **Cross-domain A2A** if Observability context matters). Paste the **Alert id** from the table above.

        ## Suggested next steps
        1. Open the linked alert(s) in **Investigate** (alerts stay synced because `syncAlerts` is on).
        2. Check **Timeline** or **Discover** for the same time window on `workshop-synth-endpoint-alerts`.
        3. If A2A enrichment is enabled, query **`.elastic-agents-security-a2a-enriched`** for merged agent + A2A audit fields (response time, severity, tool metadata).

        ## Where A2A fits
        Agent-to-agent calls that touch production should leave an auditable trail. Use this case to correlate **who** (user), **where** (host), and **what** (rule reason) before closing or escalating.
      tags: ["a2a-lab", "workflow", "automated-response"]
      severity: "high"
      owner: "securitySolution"
      settings:
        syncAlerts: true
      connector:
        id: "none"
        name: "none"
        type: ".none"
        fields: null
