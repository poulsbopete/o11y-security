name: A2A Lab — O11y alert to Case
description: >
  Case-only Observability workflow — **HTTP to Security Agent Builder /converse** then create case (defaults from **bootstrap.json**
  via **06**; optional **SECURITY_AGENT_ENDPOINT** in workshop.env). Native `http` is still limited to Kibana’s default
  connector timeout (~60s); prompts avoid heavy tool use. Prefer **A2A Lab — O11y alert log** on rules instead
  (it logs + creates a case). Do not attach both workflows to the same rule or you will get duplicate cases.
enabled: true
tags:
  - a2a-lab
triggers:
  - type: alert
steps:
  - name: a2a_call_security_agent
    type: http
    with:
      url: "__WF_SECURITY_AGENT_ENDPOINT__"
      method: POST
      headers:
        Content-Type: application/json
        kbn-xsrf: "true"
        Authorization: "__WF_SECURITY_AUTHORIZATION__"
      body: |
        {
          "agent_id": "a2a-lab-security-detection",
          "input": "Observability alert peer review — host {{ event.alerts[0].host.name }}; rule: {{ event.alerts[0].kibana.alert.rule.name }}; reason: {{ event.alerts[0].kibana.alert.reason }}. **Stay under ~45s wall clock:** reason mostly from this alert; avoid long investigations; at most one optional tight query (`LIMIT 50`) if essential. ≤6 bullets: SOC vs ops-only."
        }
    on-failure:
      continue: true
  - name: create_a_case
    type: kibana.createCaseDefaultSpace
    with:
      title: "{% assign rname = event.alerts[0].kibana.alert.rule.name | default: \"\" | downcase %}{% assign alert_suffix = event.alerts[0].kibana.alert.uuid | default: execution.id | slice: -1 | downcase %}{% capture drill_title %}{% if rname contains \"trace\" %}{% if alert_suffix == \"0\" or alert_suffix == \"1\" or alert_suffix == \"2\" %}Web / API — latency & 5xx tail{% elsif alert_suffix == \"3\" or alert_suffix == \"4\" or alert_suffix == \"5\" %}Web / API — error budget & availability{% elsif alert_suffix == \"6\" or alert_suffix == \"7\" or alert_suffix == \"8\" %}Web / API — dependency timeouts{% elsif alert_suffix == \"9\" or alert_suffix == \"a\" or alert_suffix == \"b\" %}Web / API — saturation & pressure{% elsif alert_suffix == \"c\" or alert_suffix == \"d\" %}Web / API — deploy regression{% else %}Web / API — capacity & noise{% endif %}{% elsif rname contains \"metric\" %}{% if alert_suffix == \"0\" or alert_suffix == \"1\" or alert_suffix == \"2\" %}OS / host — CPU & scheduler pressure{% elsif alert_suffix == \"3\" or alert_suffix == \"4\" or alert_suffix == \"5\" %}OS / host — memory pressure{% elsif alert_suffix == \"6\" or alert_suffix == \"7\" or alert_suffix == \"8\" %}OS / host — disk & IO contention{% elsif alert_suffix == \"9\" or alert_suffix == \"a\" or alert_suffix == \"b\" %}OS / host — fleet stability{% elsif alert_suffix == \"c\" or alert_suffix == \"d\" %}OS / host — change-window drift{% else %}OS / host — quota & limits{% endif %}{% else %}{% if alert_suffix == \"0\" or alert_suffix == \"1\" or alert_suffix == \"2\" %}Latency / SLO risk{% elsif alert_suffix == \"3\" or alert_suffix == \"4\" or alert_suffix == \"5\" %}Error budget burn{% elsif alert_suffix == \"6\" or alert_suffix == \"7\" or alert_suffix == \"8\" %}Dependency failure{% elsif alert_suffix == \"9\" or alert_suffix == \"a\" or alert_suffix == \"b\" %}Resource saturation{% elsif alert_suffix == \"c\" or alert_suffix == \"d\" %}Deploy regression{% else %}Noisy neighbor / capacity{% endif %}{% endif %}{% endcapture %}{{ event.alerts[0].kibana.alert.rule.name }} — {{ drill_title | strip }} (lab)"
      description: |
        {% assign rname = event.alerts[0].kibana.alert.rule.name | default: "" | downcase %}
        {% assign alert_suffix = event.alerts[0].kibana.alert.uuid | default: execution.id | slice: -1 | downcase %}
        {% capture drill_detail %}{% if rname contains "trace" %}{% if alert_suffix == "0" or alert_suffix == "1" or alert_suffix == "2" %}**Web / API — latency & 5xx tail** — same `workshop-synth-traces` rows support **Ops** (SLO, tail latency) and **Security** (abuse, injection, application DoS) questions; filter `workshop.demo_stream: web`.{% elsif alert_suffix == "3" or alert_suffix == "4" or alert_suffix == "5" %}**Web / API — error budget & availability** — correlate sustained 5xx with deploys; Security peers look for client abuse or forced errors.{% elsif alert_suffix == "6" or alert_suffix == "7" or alert_suffix == "8" %}**Web / API — dependency timeouts** — walk downstream health; pair with auth / DB signals on the same host.{% elsif alert_suffix == "9" or alert_suffix == "a" or alert_suffix == "b" %}**Web / API — saturation & pressure** — queueing and thread pools; check for resource exhaustion masking attack traffic.{% elsif alert_suffix == "c" or alert_suffix == "d" %}**Web / API — deploy regression** — compare release window to error/latency inflection.{% else %}**Web / API — capacity & noise** — baseline traffic vs anomalous volumes.{% endif %}{% elsif rname contains "metric" %}{% if alert_suffix == "0" or alert_suffix == "1" or alert_suffix == "2" %}**OS / host — CPU & scheduler pressure** — `workshop.demo_stream: os`; same metrics inform capacity (O11y) vs cryptomining / escape precursors (Sec).{% elsif alert_suffix == "3" or alert_suffix == "4" or alert_suffix == "5" %}**OS / host — memory pressure** — OOM risk and GC; Security may watch for unexpected memory-heavy processes.{% elsif alert_suffix == "6" or alert_suffix == "7" or alert_suffix == "8" %}**OS / host — disk & IO contention** — storage saturation; also useful for ransomware / mass-write precursors.{% elsif alert_suffix == "9" or alert_suffix == "a" or alert_suffix == "b" %}**OS / host — fleet stability** — compare host to cohort; spot outliers.{% elsif alert_suffix == "c" or alert_suffix == "d" %}**OS / host — change-window drift** — patch or config change vs metric shift.{% else %}**OS / host — quota & limits** — cgroup / ulimit / cloud caps.{% endif %}{% else %}{% if alert_suffix == "0" or alert_suffix == "1" or alert_suffix == "2" %}**Latency / SLO risk** — quantify tail latency, saturation on hot paths, and user-visible slowdown for the service tied to this signal.{% elsif alert_suffix == "3" or alert_suffix == "4" or alert_suffix == "5" %}**Error budget burn** — separate transient blips from sustained 4xx/5xx; tie errors to deploys or dependency health.{% elsif alert_suffix == "6" or alert_suffix == "7" or alert_suffix == "8" %}**Dependency failure** — walk upstream/downstream graphs; confirm timeouts and circuit-breaker behavior.{% elsif alert_suffix == "9" or alert_suffix == "a" or alert_suffix == "b" %}**Resource saturation** — CPU, memory, disk, or connection pools; check for runaway jobs or missing limits.{% elsif alert_suffix == "c" or alert_suffix == "d" %}**Deploy regression** — compare change windows to error/latency inflection points.{% else %}**Noisy neighbor / capacity** — look for shared-node contention or quota exhaustion in the same time slice.{% endif %}{% endif %}{% endcapture %}

        ## What happened
        An **Observability** alerting rule on workshop indices matched and this workflow created this case. Use it to practice **SRE-style** triage: confirm impact, scope blast radius, and capture findings in one place.

        ## Randomized drill scenario
        {{ drill_detail | strip }}
        _Picked from the last hex digit of the alert UUID (stable for this alert); **traces** rules map to **Web / API** drills, **metrics** rules to **OS / host** drills._

        ## A2A — Security peer check (O11y → Security, HTTP)
        **POST** to Security `api/agent_builder/converse` (defaults from **bootstrap.json** when **06** runs, or **SECURITY_AGENT_ENDPOINT** override). Use this block to sanity-check that the Observability signal is **not** hiding obvious security concerns.

        **Security agent response (raw)**:
        {{ steps.a2a_call_security_agent.output }}
        {% if steps.a2a_call_security_agent.error %}
        **Peer HTTP step error** (case still opened): {{ steps.a2a_call_security_agent.error }}
        {% endif %}

        ## Backlog (GitHub)
        Open **Issues → New issue** in this workshop repo → **Observability-side scenario** or **Cross-domain A2A**; paste the **Alert id** below.

        | Field | Value |
        | --- | --- |
        | **Rule** | {{ event.alerts[0].kibana.alert.rule.name }} |
        | **Reason** | {{ event.alerts[0].kibana.alert.reason }} |
        | **Host** | {{ event.alerts[0].host.name }} |
        | **Alert id** | {{ event.alerts[0].kibana.alert.uuid }} |

        ## Suggested next steps
        1. Open **Observability → APM / Services** (or **Discover**) for the alert window on `workshop-synth-metrics` and `workshop-synth-traces`.
        2. Compare **error rate** vs **latency** spikes; note `event.outcome` on traces.
        3. Add metrics or log links as case comments so the next responder has a breadcrumb trail.

        ## Lab note
        Dashboards in **Analytics** do not replace the **Alerts** UI — keep alerts and cases side by side for a realistic ops workflow.
      tags: ["a2a-lab", "workflow"]
      severity: "medium"
      owner: "observability"
      settings:
        syncAlerts: true
      connector:
        id: "none"
        name: "none"
        type: ".none"
        fields: null
