title: 'Agent Builder A2A: Serverless Observability + Security Communication'
teaser: Deploy Agent Builder agents across serverless Observability and Security,
  then wire API-to-API enrichment.
description: |
  Interactive workshop for Elastic sellers and solutions architects. Attendees deploy two Agent Builder
  agents in separate serverless projects (Observability and Security), configure cross-cluster API calls,
  enrich security detections with observability context, and visualize correlated outcomes in Kibana.

  **Duration:** 30–45 minutes (six challenges, last optional)

  **Prerequisites:** Elastic Cloud organization access, ability to create Serverless Observability and
  Serverless Security projects, and familiarity with Kibana Agent Builder at an intermediate level.

  **Base reference:** Elastic Autonomous Observability track patterns (dual environment, API-first wiring).
